<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa Bonguito</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #171717;
      --surface2: #1f1f1f;
      --text: #ffffff;
      --muted: #888;
      --border: #333;
      --accent: #e8e0d0;
      --spotify: #1DB954;
      --blue: #60a5fa;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; padding: 0 1.5rem 4rem;
    }

    header {
      width: 100%; max-width: 540px;
      padding: 3.5rem 0 2.5rem; border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .eyebrow { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }
    h1 { font-family: 'Syne', sans-serif; font-size: 3rem; font-weight: 700; line-height: 1; }
    h1 span { color: var(--muted); }

    .cards { width: 100%; max-width: 540px; display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: 16px; overflow: hidden; }
    .card { background: var(--surface); padding: 1.75rem; }
    .card-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: #fff; font-weight: 700; margin-bottom: 1.25rem; }

    /* Spotify Button */
    .btn-spotify {
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      background: var(--spotify); color: #000; text-decoration: none;
      padding: 1rem; border-radius: 50px; font-weight: 700; font-size: 0.9rem;
      transition: transform 0.2s;
    }
    .btn-spotify:active { transform: scale(0.98); }

    /* Server Grid */
    .server-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .btn-server {
      display: flex; align-items: center; justify-content: center; text-align: center;
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      padding: 1rem; border-radius: 10px; text-decoration: none; font-size: 0.85rem; font-weight: 500;
      transition: border-color 0.2s;
    }
    .btn-server:hover { border-color: var(--accent); }

    /* WiFi Controls */
    .wifi-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .btn-action { flex: 1; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: #fff; cursor: pointer; font-size: 0.75rem; }
    .btn-primary { background: var(--blue); color: #000; border: none; font-weight: 600; }

    .pass-panel, .qr-panel { display: none; background: #000; padding: 1rem; border-radius: 8px; margin-top: 1rem; text-align: center; }
    .visible { display: block !important; }
    .qr-box { background: #fff; padding: 10px; display: inline-block; border-radius: 4px; }

    footer { margin-top: 3rem; color: var(--muted); font-size: 0.7rem; }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Bienvenido a</p>
    <h1>Casa<br><span>Bonguito</span></h1>
  </header>

  <div class="cards">
    <div class="card">
      <p class="card-label">WiFi Casa</p>
      <p style="font-size: 0.9rem;">Red: <strong>Depto 1503 5GHz</strong></p>
      <div class="wifi-actions">
        <button class="btn-action btn-primary" onclick="connectWifi()">Conectar</button>
        <button class="btn-action" onclick="togglePass()">Clave</button>
        <button class="btn-action" onclick="toggleQr()">QR</button>
      </div>
      <div id="passPanel" class="pass-panel">
        <code style="font-size: 1.1rem; letter-spacing: 1px;">8koNANUwtdKccc</code>
      </div>
      <div id="qrPanel" class="qr-panel">
        <div class="qr-box" id="qrBox"></div>
      </div>
    </div>

    <div class="card">
      <p class="card-label">Música Colaborativa</p>
      <a href="https://open.spotify.com/playlist/48aZco1LtD3WRF2QrRu3Qe?si=gAXrVGLIQ8uDyIYOefuajQ&pt=bb4517ccb7bf650434d2293f34d9f424&pi=I6DNgUylTtCz6" target="_blank" class="btn-spotify">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.508 17.302c-.223.367-.704.482-1.07.259-2.858-1.747-6.456-2.143-10.693-1.173-.418.096-.842-.162-.938-.58-.096-.417.162-.841.58-.937 4.637-1.06 8.604-.604 11.862 1.386.366.223.483.704.259 1.07zm1.479-3.259c-.28.455-.878.601-1.333.32-3.27-2.01-8.254-2.593-12.119-1.42-.511.156-1.047-.134-1.203-.645-.155-.51.134-1.046.645-1.202 4.413-1.339 9.898-.684 13.689 1.64.456.28.601.878.321 1.332zm.126-3.411c-3.922-2.329-10.385-2.544-14.131-1.406-.602.183-1.242-.163-1.425-.765-.182-.603.163-1.242.766-1.425 4.301-1.306 11.439-1.054 15.93 1.613.541.321.716 1.018.395 1.559-.32.542-1.018.718-1.558.397l.023-.014z"/></svg>
        Agregar temas a Spotify
      </a>
    </div>

    <div class="card">
      <p class="card-label">Servidor</p>
      <div class="server-grid">
        <a href="https://pedir.casabonguito.com" target="_blank" class="btn-server">🎬 Series y Pelis</a>
        <a href="https://qbit.casabonguito.com" target="_blank" class="btn-server">📥 qBit</a>
        <a href="https://inventario.casabonguito.com" target="_blank" class="btn-server">📦 Inventario</a>
        <a href="https://home.casabonguito.com" target="_blank" class="btn-server">⚙️ Administración</a>
      </div>
    </div>
  </div>

  <footer>casabonguito.com</footer>

  <script>
    const SSID = "Depto 1503 5GHz";
    const PASS = "8koNANUwtdKccc";
    function togglePass() { document.getElementById('passPanel').classList.toggle('visible'); }
    function toggleQr() {
      const p = document.getElementById('qrPanel');
      p.classList.toggle('visible');
      if (p.classList.contains('visible') && !document.getElementById('qrBox').innerHTML) {
        new QRCode(document.getElementById('qrBox'), { text: `WIFI:T:WPA;S:${SSID};P:${PASS};;`, width: 150, height: 150 });
      }
    }
    function connectWifi() { window.location.href = `WIFI:T:WPA;S:${SSID};P:${PASS};;`; }
  </script>
</body>
</html>
